<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Portal - Grand Everest Hotel</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .portal-container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.3);
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        
        .welcome-section {
            background: linear-gradient(135deg, #d4af37, #c4a35a);
            padding: 60px 40px;
            color: #1e3c72;
        }
        
        .welcome-section h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        .welcome-section p {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        
        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .feature {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .feature i {
            font-size: 1.5rem;
            background: rgba(30,60,114,0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .feature span {
            font-weight: 500;
        }
        
        .login-section {
            padding: 60px 40px;
            background: white;
        }
        
        .login-section h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            color: #1e3c72;
            margin-bottom: 10px;
        }
        
        .login-section p {
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            color: #1e3c72;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #d4af37;
        }
        
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(30,60,114,0.2);
        }
        
        .register-link {
            text-align: center;
            margin-top: 25px;
        }
        
        .register-link a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .portal-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <div class="welcome-section">
            <h2>Welcome to Grand Everest</h2>
            <p>Access your guest portal to manage bookings, request services, and make your stay extraordinary.</p>
            
            <div class="feature-list">
                <div class="feature">
                    <i class="fas fa-calendar-check"></i>
                    <span>View & manage bookings</span>
                </div>
                <div class="feature">
                    <i class="fas fa-concierge-bell"></i>
                    <span>Request room service</span>
                </div>
                <div class="feature">
                    <i class="fas fa-history"></i>
                    <span>Booking history</span>
                </div>
                <div class="feature">
                    <i class="fas fa-star"></i>
                    <span>Special offers & upgrades</span>
                </div>
            </div>
        </div>
        
        <div class="login-section">
            <h2>Guest Login</h2>
            <p>Enter your credentials to access your account</p>
            
            <form onsubmit="event.preventDefault(); alert('Login successful! Welcome to Grand Everest.'); window.location.href='guest-dashboard.html';">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="guest@example.com" value="guest@example.com" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" value="password" required>
                </div>
                
                <button type="submit" class="login-btn">Access My Account</button>
                
                <div class="register-link">
                    <a href="#">New user? Register here</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
